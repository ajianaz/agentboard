name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run unit tests
        run: python3 -m pytest tests/test_unit.py -v --tb=short

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pytest
        run: pip install pytest
      - name: Run security tests
        run: python3 -m pytest tests/test_security.py -v --tb=short

  analytics-tests:
    name: Analytics Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pytest
        run: pip install pytest
      - name: Run analytics tests
        run: python3 -m pytest tests/test_analytics.py -v --tb=short

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, security-tests, analytics-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pytest
        run: pip install pytest
      - name: Run integration tests
        run: python3 tests/test_integration.py

  standalone-verify:
    name: Standalone Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify zero pip dependencies
        run: |
          grep -q "requirements" setup.py 2>/dev/null && echo "FAIL: setup.py found" && exit 1 || true
          test ! -f requirements.txt || (echo "FAIL: requirements.txt found" && exit 1)
          echo "OK: No requirements files"
      - name: Verify server starts
        run: |
          AGENTBOARD_API_KEY=ci-test-key python3 server.py &
          SERVER_PID=$!
          sleep 2
          # Check server is running
          kill -0 $SERVER_PID 2>/dev/null && echo "OK: Server started" || (echo "FAIL: Server crashed" && exit 1)
          # Check setup endpoint
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8765/api/setup)
          echo "Setup endpoint: $STATUS"
          kill $SERVER_PID 2>/dev/null
          test "$STATUS" = "200" || test "$STATUS" = "400"
