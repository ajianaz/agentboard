name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    name: Unit Tests (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: pip install pytest
      - name: Run unit tests
        run: python3 -m pytest tests/test_db.py tests/test_auth.py -v --tb=short

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pytest
        run: pip install pytest
      - name: Run security tests
        run: python3 -m pytest tests/test_security.py -v --tb=short

  analytics-tests:
    name: Analytics Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pytest
        run: pip install pytest
      - name: Run analytics tests
        run: python3 -m pytest tests/test_analytics.py tests/test_kpi_engine.py tests/test_discussions.py -v --tb=short

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, security-tests, analytics-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pytest
        run: pip install pytest
      - name: Run integration tests
        run: |
          if [ -f tests/test_integration.py ]; then
            python3 tests/test_integration.py
          else
            echo "SKIP: No integration tests found"
          fi

  standalone-verify:
    name: Standalone Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify zero pip dependencies
        run: |
          test ! -f requirements.txt || (echo "FAIL: requirements.txt found" && exit 1)
          echo "OK: No requirements files"
      - name: Verify server starts
        run: |
          AGENTBOARD_API_KEY=*** python3 server.py &
          SERVER_PID=$!
          sleep 2
          kill -0 $SERVER_PID 2>/dev/null && echo "OK: Server started" || (echo "FAIL: Server crashed" && exit 1)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8765/api/health)
          echo "Health endpoint: $STATUS"
          kill $SERVER_PID 2>/dev/null
          test "$STATUS" = "200"
