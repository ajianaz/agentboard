# ── AgentBoard — Production Deployment ──────────────────────
#
# Usage:
#   1. Clone repo: git clone https://github.com/ajianaz/agentboard.git
#   2. cd agentboard && cp .env.example .env && edit .env
#   3. docker compose -f deploy/docker-compose.prod.yml up -d
#
# Requires:
#   - Traefik reverse proxy with "public-net" external network
#   - DNS record pointing domain to server
#   - .env file with AGENTBOARD_API_KEY (or auto-generated on first run)

services:
  agentboard:
    image: ghcr.io/ajianaz/agentboard:latest
    container_name: agentboard
    restart: unless-stopped

    environment:
      AGENTBOARD_PORT: "8765"
      AGENTBOARD_HOST: "0.0.0.0"
      AGENTBOARD_PUBLIC_READ: "${AGENTBOARD_PUBLIC_READ:-true}"
      TZ: "${TZ:-Asia/Jakarta}"

    # Bind mount: repo directory → container /app
    # Code changes (git pull) are reflected immediately — no rebuild needed.
    # All runtime data (.db, .api_key) persists in this directory.
    volumes:
      - ${AGENTBOARD_DATA_DIR:-.}:/app

    # Allow container to reach host services (agent gateways via host.docker.internal)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

    networks:
      - ${TRAEFIK_NETWORK:-public-net}

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agentboard.rule=Host(`${AGENTBOARD_DOMAIN:-board.example.com}`)"
      - "traefik.http.routers.agentboard.entrypoints=websecure"
      - "traefik.http.routers.agentboard.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-myresolver}"
      - "traefik.http.services.agentboard.loadbalancer.server.port=8765"

networks:
  ${TRAEFIK_NETWORK:-public-net}:
    external: true
