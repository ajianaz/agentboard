services:
  agentboard:
    # Option A: Build from source (requires git clone)
    # build: .
    # Option B: Pull pre-built image (recommended)
    image: ghcr.io/ajianaz/agentboard:latest
    container_name: agentboard
    restart: unless-stopped
    env_file: ./.env
    volumes:
      - .:/opt/data/agentboard
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/')"]
      interval: 30s
      timeout: 5s
      retries: 3

    # Uncomment for public deployment with Traefik reverse proxy:
    # networks:
    #   - public-net
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.agentboard.rule=Host(`board.example.com`)"
    #   - "traefik.http.routers.agentboard.entrypoints=websecure"
    #   - "traefik.http.routers.agentboard.tls.certresolver=myresolver"
    #   - "traefik.http.services.agentboard.loadbalancer.server.port=8765"
